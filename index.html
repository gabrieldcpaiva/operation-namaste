<html lang="pt-BR">
  <head>

    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Namastê Tabacaria</title>
    
    <!-- ANTI-DESTRUCTION PROTOCOL: Lock out Dark Reader and Forced Dark Modes -->
    <meta name="color-scheme" content="light only">

    <link rel="preconnect" href="https://fonts.googleapis.com">

  </head>
  <body class="bg-background text-dark relative selection:bg-accent selection:text-white">
    <!-- SVG Noise Filter Overlay for Cinematic/Analog Texture -->
    <svg class="pointer-events-none fixed left-0 top-0 z-50 h-full w-full opacity-[0.05]" xmlns="http://www.w3.org/2000/svg">
      <filter id="noiseFilter">
        <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3" stitchTiles="stitch" />
      </filter>
      <rect width="100%" height="100%" filter="url(#noiseFilter)" />
    </svg>
    
    <div id="root"></div>
